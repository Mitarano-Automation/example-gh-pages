<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Demo Page</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
    }
    .card {
      background: rgba(255,255,255,0.9);
      color: #111827;
      padding: 2rem;
      border-radius: 1rem;
      max-width: 680px;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
    }
    h1 { margin-top: 0; }
  </style>
</head>
<body>
  <main class="card">
    <h1>🚀 Beispielseite läuft</h1>
    <p>Diese Seite wurde automatisch mit OpenClaw erstellt und über GitHub Pages veröffentlicht.</p>
    <p><strong>Status:</strong> online ✅</p>
  </main>
</body>
</html>
