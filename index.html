<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RL Cart-Pole Demo (JavaScript)</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: min(900px, 100%);
      background: #111827;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 6px; font-size: 1.35rem; }
    p { margin: 0 0 12px; color: #94a3b8; }
    canvas {
      width: 100%;
      height: auto;
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 10px;
      display: block;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 12px 0;
      align-items: center;
    }
    button {
      border: none;
      border-radius: 9px;
      padding: 9px 12px;
      font-weight: 600;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }
    button.secondary { background: #334155; }
    .stat {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: .92rem;
      color: #cbd5e1;
    }
    .ok { color: #34d399; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>🤖 RL Demo: Cart-Pole balancieren (Q-Learning)</h1>
    <p>Ein simples Beispiel ohne externe Libraries. Agent lernt per diskretisiertem Zustand + Q-Tabelle.</p>

    <canvas id="sim" width="860" height="360" aria-label="Cart Pole Simulation"></canvas>

    <div class="row">
      <button id="train">Training starten (400 Episoden)</button>
      <button id="play" class="secondary">Beste Policy zeigen</button>
      <button id="reset" class="secondary">Reset</button>
      <span id="status" class="stat">Bereit.</span>
    </div>

    <div class="row stat">
      <span>Episode: <b id="ep">0</b></span>
      <span>Schritte: <b id="steps">0</b></span>
      <span>Ø letzte 50: <b id="avg">0.0</b></span>
      <span>Best: <b id="best" class="ok">0</b></span>
    </div>
  </main>

  <script>
    // --- Simple cart-pole physics (based on classic control constants)
    const g = 9.8;
    const massCart = 1.0;
    const massPole = 0.1;
    const totalMass = massCart + massPole;
    const length = 0.5; // half pole length
    const poleMassLength = massPole * length;
    const forceMag = 10.0;
    const tau = 0.02; // seconds per step

    const xThreshold = 2.4;
    const thetaThreshold = 12 * Math.PI / 180;

    class CartPole {
      reset() {
        this.x = (Math.random() - 0.5) * 0.1;
        this.xDot = (Math.random() - 0.5) * 0.1;
        this.theta = (Math.random() - 0.5) * 0.1;
        this.thetaDot = (Math.random() - 0.5) * 0.1;
        this.done = false;
        this.t = 0;
        return this.state();
      }
      state() { return [this.x, this.xDot, this.theta, this.thetaDot]; }
      step(action) {
        const force = action === 1 ? forceMag : -forceMag;
        const cos = Math.cos(this.theta);
        const sin = Math.sin(this.theta);

        const temp = (force + poleMassLength * this.thetaDot * this.thetaDot * sin) / totalMass;
        const thetaAcc = (g * sin - cos * temp) / (length * (4/3 - massPole * cos * cos / totalMass));
        const xAcc = temp - poleMassLength * thetaAcc * cos / totalMass;

        this.x += tau * this.xDot;
        this.xDot += tau * xAcc;
        this.theta += tau * this.thetaDot;
        this.thetaDot += tau * thetaAcc;
        this.t += 1;

        this.done = (
          this.x < -xThreshold || this.x > xThreshold ||
          this.theta < -thetaThreshold || this.theta > thetaThreshold ||
          this.t >= 500
        );

        const reward = this.done ? 0 : 1;
        return { state: this.state(), reward, done: this.done };
      }
    }

    // --- Q-learning with discretized state space
    const bins = {
      x:      [-2.4, -1.2, -0.6, -0.2, 0, 0.2, 0.6, 1.2, 2.4],
      xDot:   [-3, -1.5, -0.8, -0.3, 0, 0.3, 0.8, 1.5, 3],
      theta:  [-0.209, -0.104, -0.052, -0.017, 0, 0.017, 0.052, 0.104, 0.209],
      tDot:   [-3.5, -2, -1, -0.4, 0, 0.4, 1, 2, 3.5]
    };

    const Q = new Map();
    let bestQ = new Map(); // snapshot of best policy so far
    let bestPolicyScore = 0;
    let returns = [];

    function toBin(value, arr) {
      let i = 0;
      while (i < arr.length - 1 && value > arr[i + 1]) i++;
      return i;
    }

    function key(s) {
      const [x, xd, th, thd] = s;
      return [
        toBin(x, bins.x),
        toBin(xd, bins.xDot),
        toBin(th, bins.theta),
        toBin(thd, bins.tDot)
      ].join('|');
    }

    function getQ(k) {
      if (!Q.has(k)) Q.set(k, [0, 0]);
      return Q.get(k);
    }

    function cloneQTable(src) {
      const out = new Map();
      for (const [k, v] of src.entries()) out.set(k, [v[0], v[1]]);
      return out;
    }

    function chooseActionFromTable(table, stateKey, eps, createIfMissing = false) {
      if (Math.random() < eps) return Math.random() < 0.5 ? 0 : 1;
      let q = table.get(stateKey);
      if (!q && createIfMissing) {
        table.set(stateKey, [0, 0]);
        q = table.get(stateKey);
      }
      const [q0, q1] = q || [0, 0];
      if (q1 > q0) return 1;
      if (q0 > q1) return 0;
      return Math.random() < 0.5 ? 0 : 1; // tie-break random
    }

    function chooseAction(stateKey, eps) {
      return chooseActionFromTable(Q, stateKey, eps, true);
    }

    // --- UI & rendering
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const epEl = document.getElementById('ep');
    const stepsEl = document.getElementById('steps');
    const avgEl = document.getElementById('avg');
    const bestEl = document.getElementById('best');

    const env = new CartPole();
    env.reset();

    function draw(e) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Track line
      const y = 260;
      ctx.strokeStyle = '#334155';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(40, y + 20);
      ctx.lineTo(canvas.width - 40, y + 20);
      ctx.stroke();

      // Convert x in [-2.4, 2.4] to screen
      const sx = ((e.x + xThreshold) / (2 * xThreshold)) * (canvas.width - 80) + 40;

      // Cart
      const cw = 70, ch = 30;
      ctx.fillStyle = '#60a5fa';
      ctx.fillRect(sx - cw/2, y, cw, ch);

      // Pole
      const poleLenPx = 120;
      const px = sx;
      const py = y;
      const ex = px + poleLenPx * Math.sin(e.theta);
      const ey = py - poleLenPx * Math.cos(e.theta);

      ctx.strokeStyle = '#f59e0b';
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(ex, ey);
      ctx.stroke();

      // Pivot
      ctx.fillStyle = '#e5e7eb';
      ctx.beginPath();
      ctx.arc(px, py, 6, 0, Math.PI * 2);
      ctx.fill();

      // HUD
      ctx.fillStyle = '#94a3b8';
      ctx.font = '14px ui-monospace, monospace';
      ctx.fillText(`x=${e.x.toFixed(2)}  theta=${(e.theta*180/Math.PI).toFixed(2)}°`, 14, 24);
    }

    function updateStats(ep = 0, steps = 0) {
      epEl.textContent = ep;
      stepsEl.textContent = steps;
      const last = returns.slice(-50);
      const avg = last.length ? last.reduce((a,b)=>a+b,0) / last.length : 0;
      avgEl.textContent = avg.toFixed(1);
      bestEl.textContent = bestPolicyScore;
    }

    async function train(episodes = 400) {
      let alpha = 0.25;
      const gamma = 0.99;
      let eps = 1.0;
      const epsMin = 0.03;
      const epsDecay = 0.992;

      for (let ep = 1; ep <= episodes; ep++) {
        let s = env.reset();
        let total = 0;

        for (let t = 0; t < 500; t++) {
          const k = key(s);
          const a = chooseAction(k, eps);
          const { state: ns, reward, done } = env.step(a);
          const nk = key(ns);

          const q = getQ(k);
          const nq = getQ(nk);
          const bestNext = Math.max(nq[0], nq[1]);
          q[a] = q[a] + alpha * (reward + gamma * bestNext - q[a]);

          s = ns;
          total += reward;
          if (done) break;
        }

        returns.push(total);
        if (total > bestPolicyScore) {
          bestPolicyScore = total;
          bestQ = cloneQTable(Q); // keep best policy separate from current policy
        }
        eps = Math.max(epsMin, eps * epsDecay);
        alpha = Math.max(0.08, alpha * 0.999);

        if (ep % 5 === 0) {
          statusEl.textContent = `Trainiere... Episode ${ep}/${episodes}, ε=${eps.toFixed(3)}`;
          updateStats(ep, total);
          draw(env);
          await new Promise(r => setTimeout(r, 0));
        }
      }

      statusEl.textContent = 'Training fertig. Klicke "Beste Policy zeigen".';
    }

    let playing = false;
    async function playPolicy() {
      if (playing) return;
      if (bestQ.size === 0) {
        statusEl.textContent = 'Keine gelernte Best-Policy vorhanden. Bitte erst trainieren.';
        return;
      }
      playing = true;
      statusEl.textContent = 'Spiele gespeicherte Best-Policy...';
      let s = env.reset();
      let steps = 0;

      while (!env.done && steps < 500) {
        const a = chooseActionFromTable(bestQ, key(s), 0, false);
        const out = env.step(a);
        s = out.state;
        steps++;
        updateStats(epEl.textContent, steps);
        draw(env);
        await new Promise(r => setTimeout(r, 16));
      }

      statusEl.textContent = `Fertig: ${steps} Schritte gehalten.`;
      bestPolicyScore = Math.max(bestPolicyScore, steps);
      updateStats(epEl.textContent, steps);
      playing = false;
    }

    document.getElementById('train').addEventListener('click', () => train(400));
    document.getElementById('play').addEventListener('click', playPolicy);
    document.getElementById('reset').addEventListener('click', () => {
      env.reset();
      Q.clear(); // current learned policy reset
      bestQ.clear(); // stored best policy reset
      returns = [];
      bestPolicyScore = 0;
      playing = false;
      updateStats(0, 0);
      statusEl.textContent = 'Reset (inkl. Q-Tabelle). Bereit.';
      draw(env);
    });

    draw(env);
    updateStats();
  </script>
</body>
</html>
